name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Launcher tests (Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable '.[dev]'

      - name: Validate shell entry points
        shell: bash
        run: |
          find scripts -maxdepth 1 -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty -n1 bash -n

      - name: Run unit tests
        run: python -m pytest

      - name: Run launcher self-test
        run: portable-comfy --root "$RUNNER_TEMP/Portable-Comfy" --self-test
