name: Build portable artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portable-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  COMFY_VERSION: 0.27.0
  COMFY_TAG: v0.27.0
  FRONTEND_VERSION: 1.45.20
  PYTHON_VERSION: 3.13.12
  TORCH_VERSION: 2.12.0+cu130
  TORCHVISION_VERSION: 0.27.0+cu130
  TORCHAUDIO_VERSION: 2.11.0+cu130
  CUDA_VERSION: "13.0"

jobs:
  build:
    name: Build CUDA 13 portable packages
    # Building on the oldest supported userspace keeps CPython, the launcher,
    # and AppImage native symbols compatible with Ubuntu 22.04 / glibc 2.35.
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # A stock hosted runner starts with roughly 14 GB free. The portable
      # CPython, QtWebEngine and CUDA wheel trees need more room while both
      # the staging tree and final archive exist.
      - name: Reclaim hosted-runner disk space
        shell: bash
        run: |
          before="$(df -h /)"
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          rm -rf "$HOME/.cache/pip"
          printf '%s\n' "$before"
          df -h /

      - name: Set up Python 3.13.12 build interpreter
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.12

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            git \
            libbz2-dev \
            libdb-dev \
            libexpat1-dev \
            libffi-dev \
            libgdbm-compat-dev \
            libgdbm-dev \
            liblzma-dev \
            libncursesw5-dev \
            libnsl-dev \
            libpulse0 \
            libreadline-dev \
            libsqlite3-dev \
            libssl-dev \
            libtiff5 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libwayland-server0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            patchelf \
            pkg-config \
            rsync \
            squashfs-tools \
            tk-dev \
            uuid-dev \
            xz-utils \
            zlib1g-dev

      - name: Build complete portable archive
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts" "$RUNNER_TEMP/portable-build"
          scripts/build_portable.sh \
            --output-dir "$GITHUB_WORKSPACE/artifacts" \
            --work-dir "$RUNNER_TEMP/portable-build"

      - name: Build replaceable ComfyUI environment archive
        shell: bash
        run: |
          scripts/build_environment_bundle.sh \
            --output-dir "$GITHUB_WORKSPACE/artifacts" \
            --work-dir "$RUNNER_TEMP/environment-build" \
            --source-root "$RUNNER_TEMP/portable-build/Portable-Comfy"

      - name: Preflight generated packages
        shell: bash
        run: |
          scripts/preflight_portable.sh \
            artifacts/Portable-Comfy-linux-x86_64.tar.gz
          scripts/preflight_environment.sh \
            artifacts/Portable-Comfy-environment-v0.27.0.tar.gz
          (cd artifacts && sha256sum -- *.tar.gz | tee SHA256SUMS)
          du -h artifacts/*
          df -h /

      # upload-artifact always supplies an artifact container. Compression
      # level zero avoids recompressing an already-compressed tarball.
      - name: Upload complete portable archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Portable-Comfy-linux-x86_64
          path: |
            artifacts/Portable-Comfy-linux-x86_64.tar.gz
            artifacts/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Upload replaceable environment archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Portable-Comfy-environment-v0.27.0
          path: |
            artifacts/Portable-Comfy-environment-v0.27.0.tar.gz
            artifacts/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  smoke-downloaded-artifact:
    name: Download and smoke-test artifact
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out smoke-test scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Reclaim smoke-runner disk space
        shell: bash
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Download complete portable artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Portable-Comfy-linux-x86_64
          path: downloaded/full

      - name: Download replaceable environment artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Portable-Comfy-environment-v0.27.0
          path: downloaded/environment

      - name: Verify downloaded archive checksums
        shell: bash
        run: |
          (cd downloaded/full && sha256sum --check --ignore-missing SHA256SUMS)
          (cd downloaded/environment && sha256sum --check --ignore-missing SHA256SUMS)

      - name: Install headless desktop libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            curl \
            file \
            gcc \
            libegl1 \
            libfontconfig1 \
            libgl1 \
            libnss3 \
            libopengl0 \
            libxcomposite1 \
            libxdamage1 \
            libxkbcommon-x11-0 \
            libxrandr2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            x11-utils \
            xvfb

      - name: Preflight the downloaded payload
        run: |
          scripts/preflight_environment.sh \
            downloaded/environment/Portable-Comfy-environment-v0.27.0.tar.gz
          scripts/preflight_portable.sh \
            downloaded/full/Portable-Comfy-linux-x86_64.tar.gz

      - name: Install the downloaded environment transactionally
        run: |
          scripts/smoke_environment_update.sh \
            downloaded/full/Portable-Comfy-linux-x86_64.tar.gz \
            downloaded/environment/Portable-Comfy-environment-v0.27.0.tar.gz \
            --timeout 120

      - name: Launch ComfyUI and the frozen desktop shell
        env:
          QTWEBENGINE_DISABLE_SANDBOX: "1"
        run: |
          scripts/smoke_artifact.sh \
            downloaded/full/Portable-Comfy-linux-x86_64.tar.gz \
            --timeout 120 \
            --allow-no-gpu
